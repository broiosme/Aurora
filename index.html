<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Aurora</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/reset.css">

    <link rel="stylesheet" href="css/base.css">

    <link rel="stylesheet" href="css/layout.css">

    <link rel="stylesheet" href="css/aurora.css">

    <link rel="stylesheet" href="css/opening.css">

    <link rel="stylesheet" href="css/pages/hero.css">

    <link rel="stylesheet" href="css/pages/transition.css">

    <link rel="stylesheet" href="css/pages/memories.css">

    <link rel="stylesheet" href="css/base/design-system.css">

    <link rel="stylesheet" href="css/components/modal.css">

</head>

<body>

    <!-- ==========================
         BACKGROUND ENGINE
    =========================== -->

    <div class="background">

        <canvas id="stars"></canvas>

        <div class="moon"></div>

        <div class="gradient-bg"></div>

        <div class="aurora"></div>

        <div class="noise"></div>

        <div class="cursor-light"></div>

    </div>



    <!-- ==================================
     OPENING SCREEN
=================================== -->

    <div class="opening">

        <div class="opening-content">

            <p class="line line-1"></p>

            <p class="line line-2"></p>

            <h1 class="name"></h1>

            <p class="click-anywhere">

                Klik di mana saja untuk memulai

            </p>

        </div>

    </div>
    <!-- ==========================
         APP
    =========================== -->

    <main id="app">

        <!-- =========================================
         THE BEGINNING
    ========================================== -->

        <section class="hero">

            <div class="hero__content">

                <p class="hero__eyebrow">
                    HAPPY BIRTHDAY
                </p>

                <h1 class="hero__title">
                    Mazyyatul<span>.</span>
                </h1>

                <p class="hero__subtitle">
                    Not every star shines the same.
                    <br>
                    Somehow, you became my favorite.
                </p>

            </div>

            <div class="hero__scroll">
                <span></span>
                Scroll
            </div>

        </section>

        <section class="transition">

            <div class="transition__content">

                <h2 class="transition__title">

                    Every star has a story<span>.</span>

                </h2>

                <p class="transition__desc">

                    Some stories fade with time.

                    <br>

                    Some stay forever.

                    <br><br>

                    Ours belongs to the second one.

                </p>

            </div>

        </section>

        <section class="memories">

            <div class="sky">

                <!-- Stars dibuat otomatis -->

            </div>

        </section>

    </main>

    <div class="memory-modal"></div>

    <!-- GSAP -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

    <!-- Lenis -->

    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

    <!-- App -->

    <script type="module" src="js/app.js"></script>



</body>

</html>
